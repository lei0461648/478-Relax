<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#050508">
  <title>4-7-8 Breathing Timer | Relax & Sleep</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      height: 100%;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
    }

    body {
      height: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      min-height: 100svh;
      background: linear-gradient(165deg, #030308 0%, #06060f 45%, #020206 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #eef0f5;
      overflow: hidden;
      touch-action: manipulation;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }

    /* 星空背景 */
    #starfield {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      height: 100svh;
      z-index: 0;
    }

    /* 主容器：一屏内排布，移动端收紧间距 */
    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(12px, 3.5vmin, 28px);
      padding: clamp(8px, 2.5vmin, 20px) clamp(12px, 4vw, 24px);
      width: 100%;
      max-width: 100vw;
      max-height: 100vh;
      max-height: 100dvh;
      max-height: 100svh;
      flex: 1 1 auto;
      min-height: 0;
    }

    /* 呼吸圆容器：按视口比例缩放，避免小屏溢出 */
    .breathing-wrapper {
      position: relative;
      width: min(72vmin, 280px);
      height: min(72vmin, 280px);
      flex-shrink: 0;
      overflow: visible;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 外层光晕 */
    .outer-glow {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.22) 0%, rgba(15, 23, 42, 0) 68%);
      transition: opacity 0.35s ease, filter 0.35s ease;
      pointer-events: none;
    }

    .outer-glow.phase-hold {
      background: radial-gradient(circle, rgba(251, 191, 36, 0.12) 0%, transparent 70%);
      filter: saturate(0.85);
    }

    .outer-glow.phase-exhale {
      background: radial-gradient(circle, rgba(94, 234, 212, 0.14) 0%, transparent 72%);
    }

    /* 主呼吸圆：高对比描边 + 深色芯 */
    .breathing-circle {
      position: relative;
      width: min(46vmin, 180px);
      height: min(46vmin, 180px);
      border-radius: 50%;
      border: 3px solid rgba(125, 211, 252, 0.92);
      background:
        radial-gradient(circle at 32% 28%, rgba(56, 189, 248, 0.18) 0%, transparent 52%),
        radial-gradient(circle at 50% 100%, rgba(15, 23, 42, 0.95) 0%, rgba(3, 7, 18, 0.98) 100%);
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.45),
        0 0 28px rgba(56, 189, 248, 0.35),
        inset 0 0 0 1px rgba(255, 255, 255, 0.06);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: border-color 0.35s ease, box-shadow 0.35s ease;
    }

    .breathing-circle.active {
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.5),
        0 0 40px rgba(56, 189, 248, 0.5),
        inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .breathing-circle.phase-inhale {
      border-color: rgba(56, 189, 248, 0.98);
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.5),
        0 0 48px rgba(34, 211, 238, 0.55),
        inset 0 0 0 1px rgba(165, 243, 252, 0.12);
    }

    .breathing-circle.phase-hold {
      border-color: rgba(251, 191, 36, 0.95);
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.55),
        0 0 36px rgba(251, 191, 36, 0.42),
        inset 0 0 0 2px rgba(253, 224, 71, 0.1);
      animation: hold-ring 2.2s ease-in-out infinite;
    }

    .breathing-circle.phase-exhale {
      border-color: rgba(45, 212, 191, 0.95);
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.5),
        0 0 32px rgba(45, 212, 191, 0.4),
        inset 0 0 0 1px rgba(204, 251, 241, 0.08);
    }

    @keyframes hold-ring {
      0%, 100% {
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.55),
          0 0 32px rgba(251, 191, 36, 0.35),
          inset 0 0 0 2px rgba(253, 224, 71, 0.08);
      }
      50% {
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.55),
          0 0 44px rgba(251, 191, 36, 0.5),
          inset 0 0 0 2px rgba(253, 224, 71, 0.14);
      }
    }

    /* 状态文字 */
    .phase-text {
      font-size: clamp(14px, 3.8vmin, 18px);
      font-weight: 500;
      letter-spacing: 0.22em;
      color: #c8e8f8;
      text-transform: uppercase;
      margin-bottom: clamp(4px, 1.2vmin, 8px);
    }

    /* 倒计时 */
    .countdown {
      font-size: clamp(28px, 9vmin, 42px);
      font-weight: 250;
      color: #f4f8fc;
      font-variant-numeric: tabular-nums;
      line-height: 1.05;
    }

    /* 底部控制区 */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    /* 开始/停止按钮 */
    .control-btn {
      padding: clamp(10px, 2.8vmin, 14px) clamp(32px, 10vw, 48px);
      font-size: clamp(13px, 3.4vmin, 15px);
      font-weight: 500;
      letter-spacing: 0.14em;
      color: #e8f4fc;
      background: rgba(56, 189, 248, 0.14);
      border: 1px solid rgba(125, 211, 252, 0.45);
      border-radius: 40px;
      cursor: pointer;
      transition: background 0.25s ease, transform 0.2s ease, border-color 0.25s ease;
      backdrop-filter: blur(10px);
      -webkit-tap-highlight-color: transparent;
    }

    .control-btn:hover {
      background: rgba(100, 140, 180, 0.2);
      transform: scale(1.02);
    }

    .control-btn:active {
      transform: scale(0.98);
    }

    /* 提示文字 */
    .hint {
      font-size: clamp(11px, 2.8vmin, 13px);
      color: rgba(148, 163, 184, 0.85);
      letter-spacing: 0.06em;
      text-align: center;
      max-width: 90vw;
      line-height: 1.35;
    }

    .hint.hidden {
      opacity: 0;
    }

    /* 周期指示器 */
    .cycle-indicator {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: max(10px, env(safe-area-inset-bottom, 10px));
      font-size: clamp(10px, 2.6vmin, 12px);
      color: rgba(148, 163, 184, 0.75);
      letter-spacing: 0.08em;
      z-index: 2;
      pointer-events: none;
    }

    /* 环境白噪音 — 音量 / 静音 */
    .ambient-mute {
      position: fixed;
      top: max(12px, env(safe-area-inset-top, 12px));
      right: max(12px, env(safe-area-inset-right, 12px));
      z-index: 2;
      width: 40px;
      height: 40px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 50%;
      background: rgba(100, 140, 180, 0.1);
      color: rgba(180, 200, 220, 0.65);
      cursor: pointer;
      transition: background 0.25s ease, color 0.25s ease, transform 0.2s ease;
      backdrop-filter: blur(8px);
    }

    .ambient-mute:hover {
      background: rgba(100, 140, 180, 0.18);
      color: rgba(200, 220, 240, 0.9);
    }

    .ambient-mute:active {
      transform: scale(0.94);
    }

    .ambient-mute svg {
      width: 20px;
      height: 20px;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .ambient-mute svg path:first-child {
      fill: currentColor;
      stroke: none;
    }

    .ambient-mute svg path:not(:first-child) {
      fill: none;
      stroke: currentColor;
    }

    .ambient-mute .icon-muted {
      display: none;
    }

    .ambient-mute.is-muted {
      color: rgba(140, 150, 165, 0.45);
    }

    .ambient-mute.is-muted .icon-unmuted {
      display: none;
    }

    .ambient-mute.is-muted .icon-muted {
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="starfield"></canvas>

  <button type="button" class="ambient-mute" id="ambientMuteBtn" aria-label="Mute ambient sound" title="Mute / unmute">
    <svg class="icon-unmuted" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M11 5L6 9H3v6h3l5 4V5z"/>
      <path d="M15.5 8.5a5 5 0 010 7"/>
      <path d="M18 6a8 8 0 010 12"/>
    </svg>
    <svg class="icon-muted" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M11 5L6 9H3v6h3l5 4V5z"/>
      <path d="M16 9l5 5M21 9l-5 5"/>
    </svg>
  </button>
  
  <div class="container">
    <div class="breathing-wrapper">
      <div class="outer-glow" id="outerGlow"></div>
      <div class="breathing-circle" id="breathingCircle">
        <span class="phase-text" id="phaseText">Ready</span>
        <span class="countdown" id="countdown">4</span>
      </div>
    </div>
    
    <div class="controls">
      <button class="control-btn" id="controlBtn">Start</button>
      <span class="hint" id="hint">Click to start 4-7-8 breathing</span>
    </div>
  </div>
  
  <div class="cycle-indicator" id="cycleIndicator"></div>

  <script>
    // ========== 星空背景 ==========
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resizeCanvas() {
      const w = window.visualViewport ? window.visualViewport.width : window.innerWidth;
      const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      canvas.width = w;
      canvas.height = h;
      initStars();
    }

    function initStars() {
      const count = Math.floor((canvas.width * canvas.height) / 8000);
      stars = [];
      for (let i = 0; i < count; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          radius: Math.random() * 1.2 + 0.3,
          opacity: Math.random() * 0.6 + 0.2,
          twinkleSpeed: Math.random() * 0.02 + 0.005,
          twinklePhase: Math.random() * Math.PI * 2
        });
      }
    }

    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const time = Date.now() * 0.001;
      
      stars.forEach(star => {
        const twinkle = Math.sin(time * star.twinkleSpeed * 10 + star.twinklePhase) * 0.3 + 0.7;
        const alpha = star.opacity * twinkle;
        
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(186, 210, 238, ${alpha * 0.85})`;
        ctx.fill();
      });
      
      requestAnimationFrame(drawStars);
    }

    window.addEventListener('resize', resizeCanvas);
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', resizeCanvas);
    }
    resizeCanvas();
    drawStars();

    // ========== 呼吸逻辑 ==========
    const breathingCircle = document.getElementById('breathingCircle');
    const outerGlow = document.getElementById('outerGlow');
    const phaseText = document.getElementById('phaseText');
    const countdown = document.getElementById('countdown');
    const controlBtn = document.getElementById('controlBtn');
    const hint = document.getElementById('hint');
    const cycleIndicator = document.getElementById('cycleIndicator');
    const ambientMuteBtn = document.getElementById('ambientMuteBtn');

    const AMBIENT_URL = 'https://cdn.pixabay.com/download/audio/2022/02/22/audio_d1718ab41b.mp3';
    const ambientAudio = new Audio(AMBIENT_URL);
    ambientAudio.loop = true;
    ambientAudio.volume = 0.35;

    function syncMuteUi() {
      const muted = ambientAudio.muted;
      ambientMuteBtn.classList.toggle('is-muted', muted);
      ambientMuteBtn.setAttribute('aria-label', muted ? 'Unmute ambient sound' : 'Mute ambient sound');
      ambientMuteBtn.setAttribute('title', muted ? 'Unmute' : 'Mute');
    }

    ambientMuteBtn.addEventListener('click', () => {
      ambientAudio.muted = !ambientAudio.muted;
      syncMuteUi();
    });

    syncMuteUi();

    let isRunning = false;
    let currentPhase = 0; // 0: 吸气, 1: 屏息, 2: 呼气
    let timeLeft = 4;
    let cycleCount = 0;
    let intervalId = null;
    let animationId = null;

    const phases = [
      { key: 'inhale', name: 'Inhale', duration: 4, scaleStart: 1, scaleEnd: 1.58, ease: 'out' },
      { key: 'hold', name: 'Hold', duration: 7, scaleStart: 1.58, scaleEnd: 1.58, ease: 'linear' },
      { key: 'exhale', name: 'Exhale', duration: 8, scaleStart: 1.58, scaleEnd: 0.8, ease: 'in' }
    ];

    function phaseWithRuntimeBounds(base) {
      if (base.key !== 'inhale') return base;
      var from = cycleCount <= 1 ? 1 : 0.8;
      return { scaleStart: from, scaleEnd: 1.58, duration: base.duration, ease: base.ease, key: base.key, name: base.name };
    }

    function setPhaseVisuals(phaseKey) {
      breathingCircle.classList.remove('phase-inhale', 'phase-hold', 'phase-exhale');
      outerGlow.classList.remove('phase-hold', 'phase-exhale');
      if (!isRunning) return;
      breathingCircle.classList.add('phase-' + phaseKey);
      if (phaseKey === 'hold') outerGlow.classList.add('phase-hold');
      if (phaseKey === 'exhale') outerGlow.classList.add('phase-exhale');
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function easeInCubic(t) {
      return t * t * t;
    }

    function applyEasing(t, ease) {
      if (ease === 'out') return easeOutCubic(t);
      if (ease === 'in') return easeInCubic(t);
      return t;
    }

    function updateDisplay() {
      const phase = phases[currentPhase];
      phaseText.textContent = phase.name;
      countdown.textContent = timeLeft;
      setPhaseVisuals(phase.key);

      if (!isRunning) {
        var pb = phaseWithRuntimeBounds(phase);
        var elapsed = pb.duration - timeLeft;
        var progress = pb.duration ? elapsed / pb.duration : 0;
        var eased = applyEasing(Math.min(Math.max(progress, 0), 1), pb.ease);
        var scale = pb.scaleStart + (pb.scaleEnd - pb.scaleStart) * eased;
        breathingCircle.style.transform = 'scale(' + scale + ')';
        outerGlow.style.transform = 'scale(' + (scale * 1.08) + ')';
        outerGlow.style.opacity = scale > 1.32 ? '0.78' : '0.48';
      }

      if (cycleCount > 0) {
        cycleIndicator.textContent = 'Cycle ' + cycleCount;
      }
    }

    function smoothAnimate() {
      if (!isRunning) return;

      if (animationId != null) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }

      const effectivePhase = phaseWithRuntimeBounds(phases[currentPhase]);
      const now = Date.now();
      const phaseStartTime = now - (effectivePhase.duration - timeLeft) * 1000;

      function animate() {
        if (!isRunning) return;

        const elapsed = (Date.now() - phaseStartTime) / 1000;
        const progress = Math.min(elapsed / effectivePhase.duration, 1);
        const eased = applyEasing(progress, effectivePhase.ease);
        const scale = effectivePhase.scaleStart + (effectivePhase.scaleEnd - effectivePhase.scaleStart) * eased;

        breathingCircle.style.transform = 'scale(' + scale + ')';
        outerGlow.style.transform = 'scale(' + (scale * 1.08) + ')';

        if (effectivePhase.key === 'inhale') {
          outerGlow.style.opacity = String(0.4 + progress * 0.42);
        } else if (effectivePhase.key === 'hold') {
          outerGlow.style.opacity = '0.62';
        } else {
          outerGlow.style.opacity = String(0.72 - progress * 0.34);
        }

        if (progress < 1) {
          animationId = requestAnimationFrame(animate);
        } else {
          animationId = null;
        }
      }

      animationId = requestAnimationFrame(animate);
    }

    function tick() {
      timeLeft--;
      
      if (timeLeft <= 0) {
        currentPhase = (currentPhase + 1) % 3;
        timeLeft = phases[currentPhase].duration;
        
        if (currentPhase === 0) {
          cycleCount++;
        }
        
        smoothAnimate();
      }
      
      updateDisplay();
    }

    function start() {
      isRunning = true;
      currentPhase = 0;
      timeLeft = phases[0].duration;
      cycleCount = 1;
      
      breathingCircle.classList.add('active');
      controlBtn.textContent = 'Stop';
      hint.classList.add('hidden');
      
      updateDisplay();
      smoothAnimate();
      intervalId = setInterval(tick, 1000);

      ambientAudio.play().catch(() => {});
    }

    function stop() {
      isRunning = false;
      
      if (intervalId) {
        clearInterval(intervalId);
        intervalId = null;
      }
      
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
      
      breathingCircle.classList.remove('active', 'phase-inhale', 'phase-hold', 'phase-exhale');
      outerGlow.classList.remove('phase-hold', 'phase-exhale');
      breathingCircle.style.transform = 'scale(1)';
      outerGlow.style.transform = 'scale(1.08)';
      outerGlow.style.opacity = '0.48';
      
      phaseText.textContent = 'Ready';
      countdown.textContent = '4';
      controlBtn.textContent = 'Start';
      hint.classList.remove('hidden');
      cycleIndicator.textContent = '';

      ambientAudio.pause();
      ambientAudio.currentTime = 0;
    }

    controlBtn.addEventListener('click', () => {
      if (isRunning) {
        stop();
      } else {
        start();
      }
    });

    // 空格键控制
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        controlBtn.click();
      }
    });
  </script>
</body>
</html>
